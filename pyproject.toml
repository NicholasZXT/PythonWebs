    # 以下都是扩展package，参见 https://llamahub.ai/
	"llama-index-llms-openai",
	"llama-index-embeddings-openai",
	"llama-index-llms-ollama",
	"llama-index-embeddings-ollama",
#    "llama-index-embeddings-huggingface",
	"llama-index-readers-file",
	"llama-index-vector-stores-chroma",
#	"llama-index-vector-stores-elasticsearch",
#	"llama-index-vector-stores-milvus",
#	"llama-index-vector-stores-neo4jvector",
    # ------ 文件处理package ------
    "python-docx",
    "pymupdf",
    "pymupdf4llm",
#    "markitdown[all]",
    "markitdown[pdf, docx, pptx, xlsx, xls]",
]
cloud = [
    "prometheus-client",
    "opentelemetry-api",
    "opentelemetry-sdk",
    "opentelemetry-distro",
#    "opentelemetry-instrumentation-asyncio",
#    "opentelemetry-instrumentation-requests",
#    "opentelemetry-instrumentation-httpx",
#    "opentelemetry-instrumentation-pymysql",
#    "opentelemetry-instrumentation-sqlalchemy",
#    "opentelemetry-instrumentation-redis",
#    "opentelemetry-instrumentation-flask",
#    "opentelemetry-instrumentation-starlette",
    "opentelemetry-instrumentation-fastapi",
#    "opentelemetry-instrumentation-django",
	"opentelemetry-exporter-otlp-proto-http",
    "opentelemetry-exporter-prometheus",
	"llama-index-observability-otel",
]
test = [
    "pytest ~= 7.4.4",
#    "pytest >= 8.2.0",
]
other = [
    "configparser >= 5.0.0",
    "pyyaml >= 6.0.2",
    "phonenumbers >= 8.13.40",
    "email-validator >= 2.3.0",
    "passlib >= 1.7.4",
    "sphinx <= 8.2.3"
]


# ------------------------------------ UV 配置 ------------------------------------
[tool.uv]
managed = true
package = false
index-url = "https://pypi.tuna.tsinghua.edu.cn/simple"
python-downloads = "manual"
#python-preference = "system"
python-preference = "managed"
link-mode = "copy"

default-groups = [
    "db", "ds",
    "flask", "fastapi", "django", "litestar", "tornado",
#    "transformer",
    "nlp", "llms", "langchain", "rag",
    "cloud",
    "test", "other"
]

# 适用于 uv pip 系列命令的配置
[tool.uv.pip]
index-url = "https://pypi.tuna.tsinghua.edu.cn/simple"
#extra-index-url = []
system = true
break-system-packages = true
all-extras = true
# group 配置对于 uv pip sync 命令不生效
group = [
    "db", "ds",
    "flask", "fastapi", "django", "litestar", "tornado",
#    "transformer",
    "nlp", "llms", "langchain", "rag",
    "cloud",
    "test", "other"
]
#torch-backend = "auto"