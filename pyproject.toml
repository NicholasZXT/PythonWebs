[build-system]
# 使用Pixi
build-backend = "hatchling.build"
requires = ["hatchling"]
# 使用 Poetry
#requires = ["poetry-core>=2.0.0,<3.0.0"]
#build-backend = "poetry.core.masonry.api"

# UV 依赖管理
# 使用方式1： uv sync
# 使用方式2： uv export --format pylock.toml -o pylock.toml  &&  uv pip sync pylock.toml

# ------------------------------------ Project 配置 ------------------------------------
[project]
name = "Python-Webs"
version = "1.0.0"
description = "A simple tutorial for python web frameworks."
authors = [
    {name = "Nicholas", email = "nicho@email.com"}
]
readme = "README.md"

#requires-python = ">=3.10,<4.0"
#requires-python = "==3.10.*"
requires-python = "~=3.12.10"

dependencies = [
# build-system 的依赖不需要出现在这里
#    "setuptools",
#    "wheel",
#    "hatchling",
    "pip",
    "psutil >= 5.9.8"
]

[project.optional-dependencies]

[dependency-groups]
db = [
    "requests >= 2.32.0",
    "httpx >= 0.24.1",
    "pymysql >= 1.0.0",
    "aiomysql >= 0.2.0",
#    "sqlalchemy == 1.4.*",
    "sqlalchemy >= 2.0.0",
    "alembic",
    "peewee >= 3.17.0",
    "elasticsearch >= 7.13.0",
    "pyhive >= 0.7.0",
    # pyhive 依赖下面的 thrift
	"thrift >= 0.20.0",
    "thrift_sasl >= 0.4.3",
    "kafka-python >= 2.0.2",
#    "neo4j-python-driver >= 5.5.0",
#    "py2neo >= 2021.2.3",
#    "happybase >= 1.2.0",
