    "gensim",
	"spacy >= 3.4.2 ",
	"spacy-pkuseg >= 1.0.0",
]
llms = [
    "openai >= 1.0.0",
    "litellm ~= 1.88.0",
    "mcp[cli] >= 1.12.0",
