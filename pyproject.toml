langchain = [
#	"langchain-core",  # 无需显式指定版本
	"langchain-classic >= 1.0.0",  # 为了兼容 v0.3 代码，v1.0.0 提供了一个兼容模块
	"langchain >=1.0.0",
	"langchain-community >= 0.4.1",
	"langgraph >= 1.0.0",
	"deepagents",
	"langchain-openai >= 1.0.0",
	"langchain-ollama >= 1.0.0",
    "langchain-text-splitters",
	"langchain-mcp-adapters >= 0.1.10",
	"langchain-elasticsearch >= 1.0.0",
#    "langgraph-checkpoint-sqlite",
#    "langgraph-checkpoint-postgres",
]
rag = [
    # llama-index 只是一个starter，包含了 llama-index-core + 插件package
#	"llama-index >= 0.14.0",
    # core 才是核心
	"llama-index-core >= 0.14.0",
